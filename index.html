<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Graph Visualizer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1e1e2e;
            color: #cdd6f4;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: #11111b;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #313244;
        }

        .search-container {
            flex-grow: 1;
            margin: 0 2rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            border: 1px solid #313244;
            background-color: #181825;
            color: #cdd6f4;
            font-size: 1rem;
        }

        main {
            display: flex;
            flex-grow: 1;
            position: relative;
        }

        #canvas-container {
            flex-grow: 1;
            background-color: #1e1e2e;
            cursor: grab;
        }

        #details-panel {
            width: 350px;
            background-color: #181825;
            border-left: 1px solid #313244;
            padding: 1rem;
            overflow-y: auto;
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            font-size: 0.85rem;
        }

        th, td {
            text-align: left;
            padding: 0.5rem;
            border-bottom: 1px solid #313244;
        }

        th {
            color: #89b4fa;
        }

        .node-info h2 {
            margin-top: 0;
            color: #f5c2e7;
            word-break: break-all;
        }

        .node-info p {
            font-size: 0.9rem;
            margin: 0.5rem 0;
        }

        #scan-btn {
            background-color: #89b4fa;
            color: #11111b;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        #scan-btn:hover {
            background-color: #b4befe;
        }

        #status {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            font-size: 0.8rem;
            color: #6c7086;
        }
    </style>
</head>
<body>
    <header>
        <div style="font-weight: bold; font-size: 1.2rem; min-width: 100px;">File Graph</div>
        <div style="display: flex; align-items: center; gap: 5px; margin-left: 10px; flex-grow: 1;">
            <label style="font-size: 0.8rem; white-space: nowrap;">Path:</label>
            <input type="text" id="dir-input" placeholder="e.g. C:\Users" style="flex-grow: 1; min-width: 200px; padding: 4px; background: #181825; border: 1px solid #313244; color: #cdd6f4;">
        </div>
        <div class="search-container" style="flex-grow: 2;">
            <input type="text" id="search-input" placeholder="Search filename... (e.g. 'main' or '.go')" style="width: 100%;">
        </div>
        <div style="display: flex; align-items: center; gap: 10px; margin-right: 20px;">
            <label style="font-size: 0.8rem;">Spacing</label>
            <input type="range" id="spacing-slider" min="100" max="2000" value="500">
            <label style="font-size: 0.8rem;">Rotate</label>
            <input type="range" id="rotate-slider" min="0" max="50" value="0">
        </div>
        <button id="scan-btn">Scan Files</button>
        <button id="restart-btn" style="background:#f9e2af; color:#11111b; margin-left:10px;">Restart</button>
        <button id="kill-btn" style="background:#f38ba8; color:#11111b; margin-left:5px;">Kill Server</button>
    </header>

    <main>
        <div id="canvas-container">
            <canvas id="graph-canvas"></canvas>
        </div>
        <div id="details-panel">
            <div class="node-info" id="node-info">
                <p>Select a node to see details</p>
            </div>
            <div id="related-files">
                <h3>Related Files</h3>
                <table id="related-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Score</th>
                        </tr>
                    </thead>
                    <tbody id="related-body">
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <div id="status">Ready</div>

    <script>
        const canvas = document.getElementById('graph-canvas');
        const ctx = canvas.getContext('2d');
        const searchInput = document.getElementById('search-input');
        const scanBtn = document.getElementById('scan-btn');
        const dirInput = document.getElementById('dir-input');
        const restartBtn = document.getElementById('restart-btn');
        const spacingSlider = document.getElementById('spacing-slider');
        const rotateSlider = document.getElementById('rotate-slider');
        const detailsPanel = document.getElementById('details-panel');
        const nodeInfo = document.getElementById('node-info');
        const relatedBody = document.getElementById('related-body');
        const status = document.getElementById('status');

        async function uiLog(msg) {
            try {
                await fetch(`/api/log?msg=${encodeURIComponent(msg)}`);
            } catch (e) {}
        }

        let nodes = [];
        let links = [];
        let width, height;
        let selectedNode = null;
        let draggedNode = null;
        let kineticEnergy = 0;
        let transform = { x: 0, y: 0, k: 1 };
        let isPanning = false;
        let lastMouse = { x: 0, y: 0 };

        function resize() {
            width = canvas.parentElement.clientWidth;
            height = canvas.parentElement.clientHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', resize);
        resize();

        // Simple Force-Directed Layout Simulation
        function simulate() {
            if (nodes.length === 0) return;

            let totalMove = 0;
            const spacing = parseFloat(spacingSlider.value);
            const rotationSpeed = parseFloat(rotateSlider.value) / 10000;

            // Repulsion between all nodes
            for (let i = 0; i < nodes.length; i++) {
                const n1 = nodes[i];
                for (let j = i + 1; j < nodes.length; j++) {
                    const n2 = nodes[j];
                    const dx = n2.x - n1.x;
                    const dy = n2.y - n1.y;
                    const distSq = dx * dx + dy * dy || 1;
                    const dist = Math.sqrt(distSq);
                    
                    const force = spacing / distSq;
                    const fx = (dx / dist) * force;
                    const fy = (dy / dist) * force;

                    n1.vx -= fx;
                    n1.vy -= fy;
                    n2.vx += fx;
                    n2.vy += fy;
                }
            }
            
            // Rotation Force (Apply a slight tangent force to each node relative to center)
            if (rotationSpeed > 0) {
                nodes.forEach(n => {
                    const dx = n.x - width/2;
                    const dy = n.y - height/2;
                    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
                    // Tangent vector is (-dy, dx)
                    n.vx += (-dy / dist) * rotationSpeed * dist;
                    n.vy += (dx / dist) * rotationSpeed * dist;
                });
            }

            // Attraction between linked nodes
            links.forEach(link => {
                const s = nodes.find(n => n.id === link.source);
                const t = nodes.find(n => n.id === link.target);
                if (!s || !t) return;

                const dx = t.x - s.x;
                const dy = t.y - s.y;
                const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                // SLOWER ATTRACTION: reduced from 0.05 to 0.02
                const strength = link.similarity * 0.02;
                
                const fx = dx * strength;
                const fy = dy * strength;

                s.vx += fx;
                s.vy += fy;
                t.vx -= fx;
                t.vy -= fy;
            });

                // Center attraction (Gravity toward center)
            let totalMove = 0;
            nodes.forEach(n => {
                if (n === draggedNode) return; // Don't apply physics while dragging

                const dx = width / 2 - n.x;
                const dy = height / 2 - n.y;
                // SLOWER CENTER GRAVITY: from 0.005 to 0.002
                n.vx += dx * 0.002;
                n.vy += dy * 0.002;

                // STRONGER DAMPING: from 0.9 to 0.8 to stop faster
                n.vx *= 0.8;
                n.vy *= 0.8;

                n.x += n.vx;
                n.y += n.vy;
                
                totalMove += Math.abs(n.vx) + Math.abs(n.vy);

                // Keep in bounds
                n.x = Math.max(10, Math.min(width - 10, n.x));
                n.y = Math.max(10, Math.min(height - 10, n.y));
            });

            kineticEnergy = totalMove;
            if (kineticEnergy > 10) {
                status.textContent = `Stabilizing... (Energy: ${Math.round(kineticEnergy)})`;
            } else {
                status.textContent = 'Stable';
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            ctx.save();
            ctx.translate(width/2 + transform.x, height/2 + transform.y);
            ctx.scale(transform.k, transform.k);
            ctx.translate(-width/2, -height/2);

            // Draw links
            links.forEach(link => {
                const s = nodes.find(n => n.id === link.source);
                const t = nodes.find(n => n.id === link.target);
                if (s && t) {
                    const isSelected = selectedNode && (s.id === selectedNode.id || t.id === selectedNode.id);
                    ctx.beginPath();
                    ctx.moveTo(s.x, s.y);
                    ctx.lineTo(t.x, t.y);
                    
                    if (isSelected) {
                        ctx.strokeStyle = 'rgba(245, 194, 231, 0.8)';
                        ctx.lineWidth = 2 / transform.k;
                        ctx.shadowBlur = 5;
                        ctx.shadowColor = '#f5c2e7';
                    } else {
                        ctx.strokeStyle = 'rgba(137, 180, 250, 0.2)';
                        ctx.lineWidth = 1 / transform.k;
                        ctx.shadowBlur = 0;
                    }
                    ctx.stroke();
                }
            });
            ctx.shadowBlur = 0; // Reset shadow

            // Draw nodes
            nodes.forEach(n => {
                // If a node is selected, fade out unrelated nodes
                let opacity = 1.0;
                let isRelated = false;
                if (selectedNode) {
                    if (n.id === selectedNode.id) {
                        isRelated = true;
                    } else {
                        isRelated = links.some(l => 
                            (l.source === selectedNode.id && l.target === n.id) ||
                            (l.target === selectedNode.id && l.source === n.id)
                        );
                    }
                    if (!isRelated) opacity = 0.15;
                }

                ctx.beginPath();
                const radius = (n.is_folder ? 6 : 4) / transform.k;
                ctx.arc(n.x, n.y, radius, 0, Math.PI * 2);
                
                if (n === selectedNode) {
                    ctx.fillStyle = '#f5c2e7';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#f5c2e7';
                } else if (n.is_folder) {
                    ctx.fillStyle = `rgba(249, 226, 175, ${opacity})`;
                    ctx.shadowBlur = 5 * opacity;
                    ctx.shadowColor = '#f9e2af';
                } else {
                    ctx.fillStyle = `rgba(137, 180, 250, ${opacity})`;
                    ctx.shadowBlur = 2 * opacity;
                    ctx.shadowColor = '#89b4fa';
                }
                
                ctx.fill();
                ctx.shadowBlur = 0;

                // Label for large or selected nodes
                if (n === selectedNode || (isRelated && nodes.length < 100)) {
                    ctx.fillStyle = `rgba(205, 214, 244, ${opacity})`;
                    ctx.font = `${10 / transform.k}px sans-serif`;
                    ctx.fillText(n.name, n.x + 8 / transform.k, n.y + 4 / transform.k);
                }
            });

            ctx.restore();

            simulate();
            requestAnimationFrame(draw);
        }

        async function openPath(path) {
            uiLog(`Click Open: ${path}`);
            try {
                await fetch(`/api/open?path=${encodeURIComponent(path)}`);
            } catch (err) {
                console.error('Failed to open path', err);
            }
        }

        async function scan() {
            const path = dirInput.value || '.';
            uiLog(`Click Scan: ${path}`);
            status.textContent = 'Scanning...';
            try {
                const resp = await fetch(`/api/scan?dir=${encodeURIComponent(path)}`);
                const data = await resp.json();
                
                // Reset transform to default view
                transform = { x: 0, y: 0, k: 1 };
                selectedNode = null;
                detailsPanel.style.display = 'none';
                
                // Initialize positions in a cluster near center
                nodes = data.nodes.map(n => ({
                    ...n,
                    x: width / 2 + (Math.random() - 0.5) * 200,
                    y: height / 2 + (Math.random() - 0.5) * 200,
                    vx: 0,
                    vy: 0
                }));
                links = data.links || [];
                
                if (nodes.length === 0) {
                    status.textContent = 'No files found in that directory.';
                    uiLog('Render: 0 nodes');
                } else {
                    status.textContent = `Found ${nodes.length} nodes and ${links.length} relations.`;
                    uiLog(`Render: ${nodes.length} nodes, ${links.length} links`);
                }
            } catch (err) {
                status.textContent = 'Error: ' + err.message;
                uiLog(`Scan ERROR: ${err.message}`);
                console.error(err);
            }
        }

        scanBtn.addEventListener('click', scan);

        searchInput.addEventListener('input', (e) => {
            const term = searchInput.value.toLowerCase();
            if (term.length < 2) return;
            const found = nodes.find(n => n.name.toLowerCase().includes(term));
            if (found) {
                selectNode(found);
                // PAN TO THE SEARCHED NODE - smooth pan
                transform.x = (width / 2 - found.x) * transform.k;
                transform.y = (height / 2 - found.y) * transform.k;
            }
        });

        restartBtn.addEventListener('click', async () => {
            if (confirm('Restart server? This will close and reopen the app.')) {
                uiLog('Click Restart');
                status.textContent = 'Restarting... please wait.';
                try {
                    await fetch('/api/shutdown');
                    setTimeout(() => {
                        window.location.reload();
                    }, 3000);
                } catch (e) {
                    setTimeout(() => {
                        window.location.reload();
                    }, 3000);
                }
            }
        });

        killBtn.addEventListener('click', async () => {
            if (confirm('Kill server? This will stop both the server AND the batch loop.')) {
                uiLog('Click Kill');
                status.textContent = 'Killing server... Loop stopped.';
                try {
                    await fetch('/api/kill');
                    document.body.innerHTML = '<div style="background:#1e1e2e; color:#cdd6f4; height:100vh; display:flex; align-items:center; justify-content:center; font-family:sans-serif;"><h1>Server Stopped. Close this tab.</h1></div>';
                } catch (e) {
                    document.body.innerHTML = '<div style="background:#1e1e2e; color:#cdd6f4; height:100vh; display:flex; align-items:center; justify-content:center; font-family:sans-serif;"><h1>Server Stopped. Close this tab.</h1></div>';
                }
            }
        });

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            // Convert screen coordinates to world coordinates
            const mx = (e.clientX - rect.left - width/2 - transform.x) / transform.k + width/2;
            const my = (e.clientY - rect.top - height/2 - transform.y) / transform.k + height/2;

            let found = null;
            nodes.forEach(n => {
                const dx = n.x - mx;
                const dy = n.y - my;
                if (Math.sqrt(dx * dx + dy * dy) < 15 / transform.k) {
                    found = n;
                }
            });

            if (found) {
                uiLog(`Select Node: ${found.name}`);
                draggedNode = found;
                selectNode(found);
            } else {
                isPanning = true;
                lastMouse = { x: e.clientX, y: e.clientY };
                selectedNode = null;
                detailsPanel.style.display = 'none';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (draggedNode) {
                const rect = canvas.getBoundingClientRect();
                const mx = (e.clientX - rect.left - width/2 - transform.x) / transform.k + width/2;
                const my = (e.clientY - rect.top - height/2 - transform.y) / transform.k + height/2;
                
                // For "bounce" effect on release, track velocity during drag
                draggedNode.vx = (mx - draggedNode.x);
                draggedNode.vy = (my - draggedNode.y);
                
                draggedNode.x = mx;
                draggedNode.y = my;
            } else if (isPanning) {
                transform.x += (e.clientX - lastMouse.x);
                transform.y += (e.clientY - lastMouse.y);
                lastMouse = { x: e.clientX, y: e.clientY };
            }
        });

        window.addEventListener('mouseup', () => {
            draggedNode = null;
            isPanning = false;
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomSpeed = 0.001;
            const delta = -e.deltaY;
            const factor = Math.pow(1.1, delta / 100);
            transform.k *= factor;
            transform.k = Math.max(0.1, Math.min(10, transform.k));
        }, { passive: false });

        function selectNode(n) {
            selectedNode = n;
            detailsPanel.style.display = 'block';
            
            nodeInfo.innerHTML = `
                <h2>${n.name}</h2>
                <p><strong>Path:</strong> <span style="font-size:0.8rem">${n.path}</span></p>
                <button onclick="openPath('${n.path.replace(/\\/g, '\\\\')}')" style="background:#a6e3a1; border:none; padding:4px 8px; border-radius:4px; cursor:pointer; font-weight:bold; color:#11111b; margin-bottom:1rem;">Open in Explorer</button>
                <p><strong>Size:</strong> ${formatSize(n.size)} (Last3: ${n.size_last_3})</p>
                <p><strong>Modified:</strong> ${new Date(n.modified_at).toLocaleString()}</p>
                <p><strong>Hash:</strong> <span style="font-size:0.7rem; color:#a6adc8; word-break:break-all;">${n.hash || 'N/A'}</span></p>
            `;

            // Find related
            const related = links
                .filter(l => l.source === n.id || l.target === n.id)
                .map(l => {
                    const otherId = l.source === n.id ? l.target : l.source;
                    const other = nodes.find(node => node.id === otherId);
                    return { node: other, score: l.similarity };
                })
                .sort((a, b) => b.score - a.score);

            relatedBody.innerHTML = '';
            if (related.length === 0) {
                relatedBody.innerHTML = '<tr><td colspan="2">No strong relations found</td></tr>';
            } else {
                related.forEach(r => {
                    if (!r.node) return;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${r.node.name}</td>
                        <td>${(r.score * 100).toFixed(1)}%</td>
                    `;
                    tr.style.cursor = 'pointer';
                    tr.onclick = (e) => {
                        e.stopPropagation();
                        selectNode(r.node);
                    };
                    relatedBody.appendChild(tr);
                });
            }
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        searchInput.addEventListener('input', (e) => {
            const term = searchInput.value.toLowerCase();
            if (term.length < 2) return;
            const found = nodes.find(n => n.name.toLowerCase().includes(term));
            if (found) {
                uiLog(`Search Found: ${term} -> ${found.name}`);
                selectNode(found);
                // PAN TO THE SEARCHED NODE - smooth pan
                transform.x = (width / 2 - found.x) * transform.k;
                transform.y = (height / 2 - found.y) * transform.k;
            }
        });


        requestAnimationFrame(draw);
        // Initial scan
        setTimeout(scan, 1500);
    </script>
</body>
</html>
