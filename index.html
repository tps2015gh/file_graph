<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Graph Visualizer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1e1e2e;
            color: #cdd6f4;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: #11111b;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #313244;
        }

         .search-container {
             flex-grow: 3;
             margin: 0 2rem;
             display: flex;
             align-items: center;
         }

        input[type="text"] {
            width: 100%;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            border: 1px solid #313244;
            background-color: #181825;
            color: #cdd6f4;
            font-size: 1rem;
        }

        main {
            display: flex;
            flex-grow: 1;
            position: relative;
        }

        #canvas-container {
            flex-grow: 1;
            background-color: #1e1e2e;
            cursor: grab;
        }

        #details-panel {
            width: 350px;
            background-color: #181825;
            border-left: 1px solid #313244;
            padding: 1rem;
            overflow-y: auto;
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            font-size: 0.85rem;
        }

        th, td {
            text-align: left;
            padding: 0.5rem;
            border-bottom: 1px solid #313244;
        }

        th {
            color: #89b4fa;
        }

        .node-info h2 {
            margin-top: 0;
            color: #f5c2e7;
            word-break: break-all;
        }

        .node-info p {
            font-size: 0.9rem;
            margin: 0.5rem 0;
        }

        #scan-btn {
            background-color: #89b4fa;
            color: #11111b;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        #scan-btn:hover {
            background-color: #b4befe;
        }

        #status {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            font-size: 0.8rem;
            color: #6c7086;
        }
    </style>
</head>
<body>
    <header>
         <div style="font-weight: bold; font-size: 1.2rem; min-width: 80px;">File Graph</div>
          <div style="display: flex; align-items: center; gap: 5px; margin-left: 10px; flex-grow: 1;">
              <button id="parent-btn" title="Go to parent folder" style="background:#313244; color:#cdd6f4; border:1px solid #45475a; padding:4px 6px; border-radius:4px; cursor:pointer; font-size:0.7rem; display: none;">⬆️</button>
              <label style="font-size: 0.8rem; white-space: nowrap;">Path:</label>
              <input type="text" id="dir-input" placeholder="e.g. C:\\Users" style="flex-grow: 1; min-width: 150px; padding: 4px; background: #181825; border: 1px solid #313244; color: #cdd6f4;">
              <button id="browse-btn" style="background:#313244; color:#cdd6f4; border:1px solid #45475a; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:0.8rem;">Browse...</button>
          </div>
          <div class="search-container" style="flex-grow: 5;">
              <input type="text" id="search-input" placeholder="Search filename... (e.g. 'main' or '.go')" style="width: 100%;">
              <span id="search-status" style="margin-left: 10px; font-size: 0.75rem; min-width: 60px;"></span>
          </div>
         <div style="display: flex; align-items: center; gap: 6px; margin-right: 10px; flex-shrink: 1;">
             <label style="font-size: 0.7rem;">Links:</label>
             <input type="range" id="links-slider" min="1" max="100" value="100" style="width: 50px;">
             <span id="links-value" style="font-size:0.65rem; min-width:25px;">100%</span>
             <label style="font-size: 0.7rem;">Max:</label>
             <input type="range" id="maxlinks-slider" min="0" max="20" value="5" style="width: 40px;">
             <span id="maxlinks-value" style="font-size:0.65rem; min-width:15px;">5</span>
             <button id="links-reset-btn" style="background:#313244; color:#cdd6f4; border:1px solid #45475a; padding:2px 4px; border-radius:3px; cursor:pointer; font-size:0.6rem;">Reset</button>
             <label style="font-size: 0.7rem;">Spacing</label>
             <input type="range" id="spacing-slider" min="100" max="2000" value="500" style="width: 40px;">
             <label style="font-size: 0.7rem;">Rotate</label>
             <input type="range" id="rotate-slider" min="0" max="50" value="0" style="width: 40px;">
             <button id="zoom-in-btn" style="background:#313244; color:#cdd6f4; border:1px solid #45475a; padding:2px 6px; border-radius:3px; cursor:pointer; font-size:0.7rem;">Zoom+</button>
             <button id="zoom-out-btn" style="background:#313244; color:#cdd6f4; border:1px solid #45475a; padding:2px 6px; border-radius:3px; cursor:pointer; font-size:0.7rem;">Zoom-</button>
             <button id="zoom-reset-btn" style="background:#313244; color:#cdd6f4; border:1px solid #45475a; padding:2px 4px; border-radius:3px; cursor:pointer; font-size:0.6rem;">1:1</button>
             <button id="shake-btn" style="background:#f38ba8; color:#11111b; border:1px solid #f38ba8; padding:2px 6px; border-radius:3px; cursor:pointer; font-size:0.7rem;">Shake</button>
             <button id="spread-btn" style="background:#89b4fa; color:#11111b; border:1px solid #89b4fa; padding:2px 6px; border-radius:3px; cursor:pointer; font-size:0.7rem;">Spread</button>
         </div>
        <button id="scan-btn">Scan Files</button>
        <button id="restart-btn" style="background:#f9e2af; color:#11111b; margin-left:10px;">Restart</button>
        <button id="kill-btn" style="background:#f38ba8; color:#11111b; margin-left:5px;">Kill Server</button>
    </header>

    <main>
        <div id="canvas-container">
            <canvas id="graph-canvas"></canvas>
        </div>
        <div id="details-panel">
            <div class="node-info" id="node-info">
                <p>Select a node to see details</p>
            </div>
            <div id="related-files">
                <h3>Related Files</h3>
                <table id="related-table">
                    <thead>
                        <tr>

                        </tr>
                    </thead>
                    <tbody id="related-body">
                    </tbody>
                </table>
            </div>
        </div>
    </main>
     <div id="status-bar" style="position:absolute; bottom:1rem; left:1rem; right:1rem; display:flex; justify-content:space-between; font-size:0.8rem; color:#6c7086; pointer-events:none;">
         <div id="status">Ready</div>
         <div id="scan-progress" style="flex-grow:1; text-align:center; padding:0 20px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div>
         <div id="heartbeat">Server: Disconnected</div>
     </div>
     
     <div id="selected-node-info" style="position:absolute; bottom:3rem; left:1rem; right:1rem; background:rgba(24,24,37,0.9); padding:0.5rem; border-radius:4px; font-size:0.75rem; color:#cdd6f4; max-height:3rem; overflow:hidden; display:none;">
         <div style="display:flex; align-items:center; gap:0.5rem;">
             <strong>Selected:</strong>
             <span id="selected-node-path" style="font-family:monospace; color:#89b4fa;">No node selected</span>
         </div>
     </div>

    <script>
        const canvas = document.getElementById('graph-canvas');
        const ctx = canvas.getContext('2d');
        const searchInput = document.getElementById('search-input');
        const scanBtn = document.getElementById('scan-btn');
        const browseBtn = document.getElementById('browse-btn');
        const dirInput = document.getElementById('dir-input');
        const restartBtn = document.getElementById('restart-btn');
        const killBtn = document.getElementById('kill-btn');
        const spacingSlider = document.getElementById('spacing-slider');
        const rotateSlider = document.getElementById('rotate-slider');
        const linksSlider = document.getElementById('links-slider');
        const linksValue = document.getElementById('links-value');
        const linksResetBtn = document.getElementById('links-reset-btn');
        const maxLinksSlider = document.getElementById('maxlinks-slider');
        const maxLinksValue = document.getElementById('maxlinks-value');
        const zoomInBtn = document.getElementById('zoom-in-btn');
        const zoomOutBtn = document.getElementById('zoom-out-btn');
        const zoomResetBtn = document.getElementById('zoom-reset-btn');
        const shakeBtn = document.getElementById('shake-btn');
        const spreadBtn = document.getElementById('spread-btn');
        const detailsPanel = document.getElementById('details-panel');
        const nodeInfo = document.getElementById('node-info');
        const relatedBody = document.getElementById('related-body');
        const status = document.getElementById('status');
         const scanProgress = document.getElementById('scan-progress');
         const heartbeatDisplay = document.getElementById('heartbeat');
         const searchStatus = document.getElementById('search-status');
        
                 let progressInterval = null;
        
         // Debug logging
         console.log('🔄 File Graph Visualizer initialized');
         console.log('📋 Available endpoints:');
         console.log('  - /api/heartbeat');
         console.log('  - /api/filelog');
         console.log('  - /api/scan');
         console.log('  - /api/log');
         console.log('🔧 Starting connectivity check...');
        
          async function updateHeartbeat() {
             try {
                 const resp = await fetch('/api/heartbeat');
                 const data = await resp.json();
                 document.getElementById('server-status').textContent = `Server: Connected (${data.time})`;
                 document.getElementById('server-status').style.color = '#a6e3a1'; // Green
                 
                 // Test the filelog API on successful connection
                 await testFileLogAPI();
                 
             } catch (e) {
                 document.getElementById('server-status').textContent = 'Server: Disconnected';
                 document.getElementById('server-status').style.color = '#f38ba8'; // Red
                 console.error('Server connection failed:', e);
             }
         }

         async function testFileLogAPI() {
             // Test the filelog API with a simple request
             try {
                 const response = await fetch('/api/filelog', {
                     method: 'POST',
                     headers: { 'Content-Type': 'application/json' },
                     body: JSON.stringify({ type: 'test', path: '/test/path', query: 'test_query' })
                 });
                 
                 if (response.ok) {
                     console.log('✅ FileLog API test successful');
                 } else {
                     console.warn('⚠️ FileLog API test failed:', response.status);
                 }
             } catch (error) {
                 console.error('❌ FileLog API test error:', error);
             }
         }

         setInterval(updateHeartbeat, 5000);
         updateHeartbeat();

         async function uiLog(msg) {
             console.log('📝 UI Log:', msg);
             try {
                 await fetch(`/api/log?msg=${encodeURIComponent(msg)}`);
                 console.log('✅ Server log successful');
             } catch (e) {
                 console.error('❌ Server log failed:', e);
             }
         }

        let nodes = [];
        let links = [];
        let width, height;
        let selectedNode = null;
        let draggedNode = null;
        let draggedConnectedNodes = []; // Array of connected nodes being dragged together
        let dragDelta = { x: 0, y: 0 }; // Delta movement for connected nodes
        let kineticEnergy = 0;
        let simulationAlpha = 1.0;
        let transform = { x: 0, y: 0, k: 1 };
        let isPanning = false;
        let lastMouse = { x: 0, y: 0 };
        let linksFilter = 100; // percentage of top links to show
        let maxLinksPerNode = 5; // limit links per node (0 = no limit)
        let filteredLinks = []; // computed filtered links

        function resize() {
            width = canvas.parentElement.clientWidth;
            height = canvas.parentElement.clientHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', resize);
        resize();

        // Barnes-Hut Quad Tree Implementation
        class QuadTree {
            constructor(bounds, capacity = 4) {
                this.bounds = bounds;
                this.capacity = capacity;
                this.nodes = [];
                this.divided = false;
                this.children = [];
                this.centerOfMass = { x: 0, y: 0, mass: 0 };
            }

            subdivide() {
                const { x, y, width, height } = this.bounds;
                const halfWidth = width / 2;
                const halfHeight = height / 2;
                
                this.children = [
                    new QuadTree({ x: x, y: y, width: halfWidth, height: halfHeight }, this.capacity),
                    new QuadTree({ x: x + halfWidth, y: y, width: halfWidth, height: halfHeight }, this.capacity),
                    new QuadTree({ x: x, y: y + halfHeight, width: halfWidth, height: halfHeight }, this.capacity),
                    new QuadTree({ x: x + halfWidth, y: y + halfHeight, width: halfWidth, height: halfHeight }, this.capacity)
                ];
                this.divided = true;
                
                // Move existing nodes to appropriate children
                for (const node of this.nodes) {
                    this.insert(node, 5); // Start with some recursion depth
                }
                this.nodes = [];
            }

            insert(node, recursionDepth = 0) {
                // Prevent infinite recursion due to identical coordinates
                if (recursionDepth > 20) {
                    // Apply tiny random offset and retry
                    node.x += (Math.random() - 0.5) * 0.001;
                    node.y += (Math.random() - 0.5) * 0.001;
                    recursionDepth = 0;
                }

                if (!this.contains(node)) return false;

                if (!this.divided && this.nodes.length < this.capacity) {
                    this.nodes.push(node);
                    this.updateCenterOfMass(node);
                    return true;
                }

                if (!this.divided) {
                    this.subdivide();
                }

                for (const child of this.children) {
                    if (child.insert(node, recursionDepth + 1)) {
                        this.updateCenterOfMass(node);
                        return true;
                    }
                }
                return false;
            }

            contains(node) {
                return node.x >= this.bounds.x && 
                       node.x <= this.bounds.x + this.bounds.width &&
                       node.y >= this.bounds.y && 
                       node.y <= this.bounds.y + this.bounds.height;
            }

            updateCenterOfMass(node) {
                const totalMass = this.centerOfMass.mass + 1;
                this.centerOfMass.x = (this.centerOfMass.x * this.centerOfMass.mass + node.x) / totalMass;
                this.centerOfMass.y = (this.centerOfMass.y * this.centerOfMass.mass + node.y) / totalMass;
                this.centerOfMass.mass = totalMass;
            }

            calculateForces(node, theta = 0.5, callback) {
                if (!this.centerOfMass.mass || (node.x === this.centerOfMass.x && node.y === this.centerOfMass.y)) {
                    return;
                }

                const dx = this.centerOfMass.x - node.x;
                const dy = this.centerOfMass.y - node.y;
                const distanceSquared = dx * dx + dy * dy || 1;
                const widthSquared = this.bounds.width * this.bounds.width;

                // If far enough away, treat as single entity
                if (widthSquared / distanceSquared < theta || this.nodes.length <= 1) {
                    callback(dx, dy, distanceSquared, this.centerOfMass.mass);
                    return;
                }

                // Otherwise, recurse into children
                if (this.divided) {
                    for (const child of this.children) {
                        child.calculateForces(node, theta, callback);
                    }
                } else {
                    // Calculate forces with individual nodes
                    for (const otherNode of this.nodes) {
                        if (otherNode !== node) {
                            const dx = otherNode.x - node.x;
                            const dy = otherNode.y - node.y;
                            const distSq = dx * dx + dy * dy || 1;
                            callback(dx, dy, distSq, 1);
                        }
                    }
                }
            }
        }

        // Force-Directed Layout Simulation with Barnes-Hut optimization
        function simulate() {
            if (nodes.length === 0) return;
            
            // "Brake" - if energy is low or cooling is done, stop movement
            if (simulationAlpha < 0.01) {
                status.textContent = 'Stable (Stopped)';
                return;
            }

            let totalMove = 0;
            const spacing = parseFloat(spacingSlider.value);
            const rotationSpeed = parseFloat(rotateSlider.value) / 10000;
            
            // Smoother cooling decay
            simulationAlpha *= 0.998; 

            // More gentle force scaling for large datasets
            const adaptiveForceMultiplier = Math.min(simulationAlpha, 0.5 + (0.5 * Math.log10(nodes.length + 1) / Math.log10(1001)));

            // Build quad tree with coordinate deduplication
            const bounds = { x: 0, y: 0, width: width, height: height };
            const quadTree = new QuadTree(bounds);
            
            // Prevent infinite recursion by deduplicating coordinates
            const seenCoords = new Set();
            nodes.forEach(node => {
                const key = `${node.x.toFixed(3)}|${node.y.toFixed(3)}`;
                if (seenCoords.has(key)) {
                    // Apply tiny random offset for duplicate coordinates
                    node.x += (Math.random() - 0.5) * 0.01;
                    node.y += (Math.random() - 0.5) * 0.01;
                }
                seenCoords.add(`${node.x.toFixed(3)}|${node.y.toFixed(3)}`);
                quadTree.insert(node);
            });

            // Calculate repulsion using Barnes-Hut with force normalization
            let totalForceMagnitude = 0;
            let forceCount = 0;
            
            // First pass: calculate average force magnitude
            nodes.forEach(node => {
                quadTree.calculateForces(node, Math.max(0.3, 0.7 - nodes.length / 50000), (dx, dy, distSq, mass) => {
                    const dist = Math.sqrt(distSq);
                    const adaptiveMass = Math.min(mass, Math.sqrt(nodes.length));
                    const force = (spacing * adaptiveMass / (distSq + 100)) * adaptiveForceMultiplier;
                    totalForceMagnitude += Math.abs(force);
                    forceCount++;
                });
            });
            
            const avgForce = forceCount > 0 ? totalForceMagnitude / forceCount : 1;
            const forceScale = Math.min(1, Math.max(0.1, 10 / avgForce)); // Normalize forces
            
            // Debug force info
            if (Math.random() < 0.01) { // Log occasionally
                status.textContent = `Forces: avg=${avgForce.toFixed(3)} scale=${forceScale.toFixed(3)} nodes=${nodes.length}`;
            }
            
            // Second pass: apply normalized forces
            nodes.forEach(node => {
                quadTree.calculateForces(node, Math.max(0.3, 0.7 - nodes.length / 50000), (dx, dy, distSq, mass) => {
                    const dist = Math.sqrt(distSq);
                    const adaptiveMass = Math.min(mass, Math.sqrt(nodes.length));
                    const force = (spacing * adaptiveMass / (distSq + 100)) * adaptiveForceMultiplier * forceScale;
                    const fx = (dx / dist) * force;
                    const fy = (dy / dist) * force;

                    node.vx -= fx;
                    node.vy -= fy;
                });
            });

            // Add rotation force
            if (rotationSpeed > 0) {
                nodes.forEach(n => {
                    const dx = n.x - width/2;
                    const dy = n.y - height/2;
                    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
                    n.vx += (-dy / dist) * rotationSpeed * dist * adaptiveForceMultiplier;
                    n.vy += (dx / dist) * rotationSpeed * dist * adaptiveForceMultiplier;
                });
            }

            // Add link attraction
            filteredLinks.forEach(link => {
                const s = nodes.find(n => n.id === link.source);
                const t = nodes.find(n => n.id === link.target);
                if (!s || !t) return;
                const dx = t.x - s.x;
                const dy = t.y - s.y;
                const strength = link.similarity * 0.02 * adaptiveForceMultiplier;
                s.vx += dx * strength;
                s.vy += dy * strength;
                t.vx -= dx * strength;
                t.vy -= dy * strength;
            });

            // "Brake" logic: Friction increases as Alpha decreases
            // Damping goes from 0.9 (low friction) to 0.4 (heavy brake)
            const friction = 0.4 + (0.5 * simulationAlpha);

            nodes.forEach(n => {
                if (n === draggedNode) return;

                const dx = width / 2 - n.x;
                const dy = height / 2 - n.y;
                 n.vx += dx * 0.002 * adaptiveForceMultiplier;
                 n.vy += dy * 0.002 * adaptiveForceMultiplier;

                 n.vx *= friction;
                 n.vy *= friction;

                 n.x += n.vx;
                 n.y += n.vy;
                 
                 totalMove += Math.abs(n.vx) + Math.abs(n.vy);
                 // Relaxed boundaries for larger graphs
                 const margin = Math.max(50, Math.min(width, height) * 0.1);
                 n.x = Math.max(margin, Math.min(width - margin, n.x));
                 n.y = Math.max(margin, Math.min(height - margin, n.y));
            });

            kineticEnergy = totalMove;
            status.textContent = `Stabilizing... (Alpha: ${simulationAlpha.toFixed(2)})`;
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            ctx.save();
            ctx.translate(width/2 + transform.x, height/2 + transform.y);
            ctx.scale(transform.k, transform.k);
            ctx.translate(-width/2, -height/2);

            // Draw links
            filteredLinks.forEach(link => {
                const s = nodes.find(n => n.id === link.source);
                const t = nodes.find(n => n.id === link.target);
                if (s && t) {
                    const isSelected = selectedNode && (s.id === selectedNode.id || t.id === selectedNode.id);
                    ctx.beginPath();
                    ctx.moveTo(s.x, s.y);
                    ctx.lineTo(t.x, t.y);
                    
                    if (isSelected) {
                        ctx.strokeStyle = 'rgba(245, 194, 231, 0.8)';
                        ctx.lineWidth = 2 / transform.k;
                        ctx.shadowBlur = 5;
                        ctx.shadowColor = '#f5c2e7';
                    } else {
                        ctx.strokeStyle = 'rgba(137, 180, 250, 0.2)';
                        ctx.lineWidth = 1 / transform.k;
                        ctx.shadowBlur = 0;
                    }
                    ctx.stroke();
                }
            });
            ctx.shadowBlur = 0; // Reset shadow

            // Draw nodes
            nodes.forEach(n => {
                // If a node is selected, fade out unrelated nodes
                let opacity = 1.0;
                let isRelated = false;
                if (selectedNode) {
                    if (n.id === selectedNode.id) {
                        isRelated = true;
                    } else {
                        isRelated = links.some(l => 
                            (l.source === selectedNode.id && l.target === n.id) ||
                            (l.target === selectedNode.id && l.source === n.id)
                        );
                    }
                    if (!isRelated) opacity = 0.15;
                }

                ctx.beginPath();
                const radius = (n.is_folder ? 6 : 4) / transform.k;
                ctx.arc(n.x, n.y, radius, 0, Math.PI * 2);
                
                 if (n.searchHighlight && n.highlightAlpha > 0) {
                     // Search highlight glow effect
                     ctx.fillStyle = n.highlightColor || '#ff6b6b';
                     ctx.globalAlpha = n.highlightAlpha;
                     ctx.shadowBlur = 20 * n.highlightAlpha;
                     ctx.shadowColor = n.highlightColor || '#ff6b6b';
                 } else if (draggedConnectedNodes.includes(n)) {
                     // Highlight connected nodes during drag
                     ctx.fillStyle = '#a6e3a1';
                     ctx.shadowBlur = 10;
                     ctx.shadowColor = '#a6e3a1';
                 } else if (n === selectedNode) {
                     ctx.fillStyle = '#f5c2e7';
                     ctx.shadowBlur = 15;
                     ctx.shadowColor = '#f5c2e7';
                 } else if (n.is_folder) {
                     ctx.fillStyle = `rgba(249, 226, 175, ${opacity})`;
                     ctx.shadowBlur = 5 * opacity;
                     ctx.shadowColor = '#f9e2af';
                 } else {
                     ctx.fillStyle = `rgba(137, 180, 250, ${opacity})`;
                     ctx.shadowBlur = 2 * opacity;
                     ctx.shadowColor = '#89b4fa';
                 }
                
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1.0;

                 // Label for large or selected nodes
                 if (n === selectedNode || (isRelated && nodes.length < 100) || draggedConnectedNodes.includes(n)) {
                     ctx.fillStyle = `rgba(205, 214, 244, ${opacity})`;
                     ctx.font = `${10 / transform.k}px sans-serif`;
                     ctx.fillText(n.name, n.x + 8 / transform.k, n.y + 4 / transform.k);
                 }
            });

            ctx.restore();

            simulate();
            requestAnimationFrame(draw);
        }

        async function openPath(path) {
            uiLog(`Click Open: ${path}`);
            try {
                await fetch(`/api/open?path=${encodeURIComponent(path)}`);
            } catch (err) {
                console.error('Failed to open path', err);
            }
        }

        async function scan() {
            let path = dirInput.value || '.';
            // Normalize Windows backslashes to forward slashes for the URL
            path = path.replace(/\\/g, '/');
            uiLog(`Click Scan: ${path}`);
            status.textContent = 'Scanning...';
            scanProgress.textContent = 'Reading files...';
            
            // Start polling progress
            if (progressInterval) clearInterval(progressInterval);
            progressInterval = setInterval(async () => {
                try {
                    const r = await fetch('/api/progress');
                    const d = await r.json();
                    if (d.path) scanProgress.textContent = `Reading: ${d.path}`;
                } catch(e) {}
            }, 100);

            try {
                const resp = await fetch(`/api/scan?dir=${encodeURIComponent(path)}`);
                const data = await resp.json();
                
                clearInterval(progressInterval);
                scanProgress.textContent = '';
                
                // Reset transform to default view
                transform = { x: 0, y: 0, k: 1 };
                selectedNode = null;
                detailsPanel.style.display = 'none';
                simulationAlpha = 1.0; // Reset Cooling
                
                // Initialize node positions using separate function
                nodes = initializeNodePositions(data.nodes, width, height);
                links = data.links || [];
                updateFilteredLinks(); // Initialize filtered links
                
                if (nodes.length === 0) {
                    status.textContent = 'No files found in that directory.';
                    uiLog('Render: 0 nodes');
                } else {
                    status.textContent = `Found ${nodes.length} nodes and ${links.length} relations.`;
                    uiLog(`Render: ${nodes.length} nodes, ${links.length} links`);
                }
            } catch (err) {
                status.textContent = 'Error: ' + err.message;
                uiLog(`Scan ERROR: ${err.message}`);
                console.error(err);
            }
        }

         scanBtn.addEventListener('click', scan);
         document.getElementById('parent-btn').addEventListener('click', navigateToParentFolder);

         browseBtn.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.webkitdirectory = true;
            input.multiple = false;
            
            input.onchange = (e) => {
                const files = e.target.files;
                if (files.length > 0) {
                    const file = files[0];
                    let path = file.webkitRelativePath || file.name;
                    const lastSlash = Math.max(path.lastIndexOf('/'), path.lastIndexOf('\\'));
                    if (lastSlash > 0) {
                        path = path.substring(0, lastSlash);
                    }
                    dirInput.value = path;
                }
            };
            
            input.click();
        });

          searchInput.addEventListener('input', (e) => {

              if (term.length < 2) {

                      detailsPanel.style.display = 'none';
                  }

              }
              
               // Find ALL matching nodes
               const foundNodes = nodes.filter(n => n.name.toLowerCase().includes(term));
               
               if (foundNodes.length > 0) {
                   searchStatus.textContent = `✓ Found ${foundNodes.length} nodes`;
                   searchStatus.style.color = '#a6e3a1'; // Green
                   uiLog(`Search Found: ${term} -> ${foundNodes.length} matches`);
                   
                   // Debug: Verify file count
                   console.log(`🔍 Search "${term}" found ${foundNodes.length} files:`);
                   foundNodes.forEach(node => console.log(`  📄 ${node.path}`));
                  
                   // Copy ALL paths to clipboard
                   const allPaths = foundNodes.map(n => n.path).join('\n');
                   
                   // Add small delay to ensure clipboard permission
                   setTimeout(() => {
                       navigator.clipboard.writeText(allPaths).then(() => {
                           console.log(`✅ Copied ${foundNodes.length} paths to clipboard:`);
                           console.log(allPaths);
                           uiLog(`📋 Copied ${foundNodes.length} file paths to clipboard`);
                           
                           // Also update status to show copy success
                           searchStatus.textContent = `✓ Found ${foundNodes.length} nodes (Copied!)`;
                           
                       }).catch(err => {
                           console.error('❌ Clipboard copy failed:', err);
                           uiLog('⚠️ Clipboard copy failed - try clicking a file instead');
                           
                           // Show fallback message
                           searchStatus.textContent = `✓ Found ${foundNodes.length} nodes (Click file)`;
                       });
                   }, 100);
                  
                  // Log search to files.log
                  fetch('/api/filelog', {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ type: 'search', query: term })
                  });
                  
                  // Select first node but highlight all
                  selectNode(foundNodes[0]);
                  
                  // Pan to center of all found nodes
                  const avgX = foundNodes.reduce((sum, n) => sum + n.x, 0) / foundNodes.length;
                  const avgY = foundNodes.reduce((sum, n) => sum + n.y, 0) / foundNodes.length;
                  transform.x = (width / 2 - avgX) * transform.k;
                  transform.y = (height / 2 - avgY) * transform.k;
                  
                  // Add visual highlighting for all matches
                  highlightSearchResults(foundNodes);
                  
              } else {
                  searchStatus.textContent = '✗ Not found';
                   searchStatus.style.color = '#f38ba8'; // Pink/red
               }
           });

        restartBtn.addEventListener('click', async () => {
            if (confirm('Restart server? This will close and reopen the app.')) {
                uiLog('Click Restart');
                status.textContent = 'Restarting... please wait.';

                    await fetch('/api/shutdown');

        });

        killBtn.addEventListener('click', async () => {
            if (confirm('Kill server? This will stop both the server AND the batch loop.')) {
                uiLog('Click Kill');
                status.textContent = 'Killing server... Loop stopped.';
                try {

                } catch (e) {
                    document.body.innerHTML = '<div style="background:#1e1e2e; color:#cdd6f4; height:100vh; display:flex; align-items:center; justify-content:center; font-family:sans-serif;"><h1>Server Stopped. Close this tab.</h1></div>';

            }
        });

        // Zoom In button (2x per click, max 50x)
        zoomInBtn.addEventListener('click', () => {
            transform.k *= 2;
            transform.k = Math.min(50, transform.k);
        });

         // Zoom Out button (2x per click)
         zoomOutBtn.addEventListener('click', () => {
             transform.k /= 2;
             transform.k = Math.max(0.002, transform.k); // Allow much smaller zoom
         });

        // Zoom Reset button
        zoomResetBtn.addEventListener('click', () => {
            transform.k = 1;
            transform.x = 0;
            transform.y = 0;
        });

        // Links filter slider
        linksSlider.addEventListener('input', (e) => {
            linksFilter = parseInt(e.target.value);
            linksValue.textContent = linksFilter + '%';
            updateFilteredLinks();
            simulationAlpha = 0.5; // Wake up to recalculate positions
        });

        // Links Reset button
        linksResetBtn.addEventListener('click', () => {
            linksSlider.value = 100;
            linksFilter = 100;
            linksValue.textContent = '100%';
            maxLinksSlider.value = 5;
            maxLinksPerNode = 5;
            maxLinksValue.textContent = '5';
            updateFilteredLinks();
            simulationAlpha = 0.5;
        });

        // Max links per node slider
        maxLinksSlider.addEventListener('input', (e) => {
            maxLinksPerNode = parseInt(e.target.value);
            maxLinksValue.textContent = maxLinksPerNode;
            updateFilteredLinks();
            simulationAlpha = 0.5;
        });

        // Function to calculate initial node positions (spiral distribution)
        function initializeNodePositions(nodeList, canvasWidth, canvasHeight) {
            const nodeCount = nodeList.length;
            const spreadRadius = Math.min(Math.max(300, nodeCount * 3), 2000);
            
            return nodeList.map((n, i) => {
                const angle = i * 0.5; // Golden angle-ish
                const r = Math.sqrt(i) * (spreadRadius / Math.sqrt(nodeCount));
                return {
                    ...n,
                    x: canvasWidth / 2 + Math.cos(angle) * r,
                    y: canvasHeight / 2 + Math.sin(angle) * r,
                    vx: 0,
                    vy: 0
                };
            });
        }

        // Function to calculate links (with max per node limit)
        function calculateFilteredLinks(allLinks, filterPercent, maxPerNode) {
            if (allLinks.length === 0) return [];
            
            // Sort links by similarity
            const sorted = [...allLinks].sort((a, b) => b.similarity - a.similarity);
            
            // Filter by percentage
            const keepCount = Math.ceil(sorted.length * filterPercent / 100);
            const threshold = sorted[keepCount - 1]?.similarity || 0;
            let filtered = sorted.filter(l => l.similarity >= threshold);
            
            // Limit links per node
            if (maxPerNode > 0) {
                const nodeLinkCount = {};
                filtered = filtered.filter(l => {
                    const sourceCount = nodeLinkCount[l.source] || 0;
                    const targetCount = nodeLinkCount[l.target] || 0;
                    if (sourceCount < maxPerNode && targetCount < maxPerNode) {
                        nodeLinkCount[l.source] = sourceCount + 1;
                        nodeLinkCount[l.target] = targetCount + 1;
                        return true;
                    }
                    return false;
                });
            }
            
            return filtered;
        }

        function updateFilteredLinks() {
            filteredLinks = calculateFilteredLinks(links, linksFilter, maxLinksPerNode);
            status.textContent = `Links: ${filteredLinks.length} / ${links.length} (${linksFilter}%, max ${maxLinksPerNode}/node)`;
        }

        // Shake button - adds random small energy to all nodes
        shakeBtn.addEventListener('click', () => {
            uiLog('Click Shake');
            nodes.forEach(n => {
                n.vx += (Math.random() - 0.5) * 10;
                n.vy += (Math.random() - 0.5) * 10;
            });
            simulationAlpha = 0.8;
            status.textContent = 'Shaking!';
        });

        // Spread button - redistribute nodes in spiral pattern using separate function
        spreadBtn.addEventListener('click', () => {
            uiLog('Click Spread');
            nodes = initializeNodePositions(nodes, width, height);
            simulationAlpha = 0.8;
            status.textContent = 'Spread reset!';
        });

         let lastClickTime = 0;
         let lastClickedNode = null;

         canvas.addEventListener('mousedown', (e) => {
             const rect = canvas.getBoundingClientRect();
             // Convert screen coordinates to world coordinates
             const mx = (e.clientX - rect.left - width/2 - transform.x) / transform.k + width/2;
             const my = (e.clientY - rect.top - height/2 - transform.y) / transform.k + height/2;

             let found = null;
             nodes.forEach(n => {
                 const dx = n.x - mx;
                 const dy = n.y - my;
                 if (Math.sqrt(dx * dx + dy * dy) < 15 / transform.k) {
                     found = n;
                 }
             });

              if (found) {
                  // Check for double-click
                  const currentTime = Date.now();
                  if (currentTime - lastClickTime < 300 && lastClickedNode === found) {
                      // Double-click detected - navigate into folder
                      if (found.is_folder) {
                          navigateToFolder(found.path);
                          return;
                      }
                  }
                  
                  lastClickTime = currentTime;
                  lastClickedNode = found;
                  
                  uiLog(`Select Node: ${found.name}`);
                  // Calm the simulation - don't add energy
                  simulationAlpha = Math.min(simulationAlpha, 0.3);
                  draggedNode = found;
                  
                  // Find all connected nodes to drag together
                  draggedConnectedNodes = findConnectedNodes(found);
                  uiLog(`Dragging ${draggedConnectedNodes.length + 1} nodes together`);
                  
                  selectNode(found);
               } else {
                  isPanning = true;
                  simulationAlpha = 0.1;
                  lastMouse = { x: e.clientX, y: e.clientY };
                  selectedNode = null;
                  detailsPanel.style.display = 'none';
                  // Hide bottom display
                  document.getElementById('selected-node-info').style.display = 'none';
              }
          });

         window.addEventListener('mousemove', (e) => {
             if (draggedNode) {
                 const rect = canvas.getBoundingClientRect();
                 const mx = (e.clientX - rect.left - width/2 - transform.x) / transform.k + width/2;
                 const my = (e.clientY - rect.top - height/2 - transform.y) / transform.k + height/2;
                 
                 // Calculate movement delta
                 const deltaX = mx - draggedNode.x;
                 const deltaY = my - draggedNode.y;
                 
                 // For "bounce" effect on release, track velocity during drag
                 draggedNode.vx = deltaX;
                 draggedNode.vy = deltaY;
                 
                 draggedNode.x = mx;
                 draggedNode.y = my;
                 
                 // Move all connected nodes by the same delta
                 draggedConnectedNodes.forEach(connectedNode => {
                     if (connectedNode !== draggedNode) {
                         connectedNode.x += deltaX;
                          connectedNode.y += deltaY;
                     }
                 });
             } else if (isPanning) {
                transform.x += (e.clientX - lastMouse.x);
                transform.y += (e.clientY - lastMouse.y);
                lastMouse = { x: e.clientX, y: e.clientY };
            }
        });

        window.addEventListener('mouseup', () => {
            if (draggedNode) {
                // Apply bounce physics if node is near canvas edge
                const edgeMargin = 50;
                const maxEnergy = 10;
                
                // Check if node is near any edge
                const nearLeft = draggedNode.x < edgeMargin;
                const nearRight = draggedNode.x > width - edgeMargin;
                const nearTop = draggedNode.y < edgeMargin;
                const nearBottom = draggedNode.y > height - edgeMargin;
                
                if (nearLeft || nearRight || nearTop || nearBottom) {
                    // Calculate bounce energy based on how close to edge
                    let energyX = 0, energyY = 0;
                    
                    if (nearLeft) energyX = maxEnergy * (1 - draggedNode.x / edgeMargin);
                    if (nearRight) energyX = -maxEnergy * (1 - (width - draggedNode.x) / edgeMargin);
                    if (nearTop) energyY = maxEnergy * (1 - draggedNode.y / edgeMargin);
                    if (nearBottom) energyY = -maxEnergy * (1 - (height - draggedNode.y) / edgeMargin);
                    
                    // Apply bounce energy
                    applyBounceEnergy(draggedNode, energyX, energyY);
                    uiLog(`Bounce! (${energyX.toFixed(1)}, ${energyY.toFixed(1)})`);
                }
             }
             
             draggedNode = null;
             draggedConnectedNodes = [];
             isPanning = false;
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomSpeed = 0.001;
            const delta = -e.deltaY;
             const factor = Math.pow(1.1, delta / 100);
             transform.k *= factor;
             transform.k = Math.max(0.002, Math.min(100, transform.k)); // Wider zoom range
        }, { passive: false });

          function selectNode(n) {
              selectedNode = n;
              detailsPanel.style.display = 'block';
              
              // Auto-copy path to clipboard on node select
              navigator.clipboard.writeText(n.path).then(() => {
                  console.log(`Path copied: ${n.path}`);
                  uiLog(`Copied: ${n.path}`);
              }).catch(err => {
                  console.error('Clipboard copy failed:', err);
              });
              
              // Log node click to files.log
              fetch('/api/filelog', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ type: 'click', path: n.path })
              });
             
             // Update bottom display
             const selectedInfo = document.getElementById('selected-node-info');
             const selectedPath = document.getElementById('selected-node-path');
             selectedInfo.style.display = 'flex';
             selectedPath.textContent = `${n.name} - ${n.path}`;
             
             nodeInfo.innerHTML = `
                <div style="background:#313244; padding:10px; border-radius:4px; margin-bottom:1rem;">
                    <h2 style="margin:0; font-size:1.1rem; color:#f5c2e7;">Full Path:</h2>
                    <div id="full-path-display" style="font-size:0.8rem; margin-top:5px; word-break:break-all; color:#a6adc8; font-family:monospace; background:#181825; padding:8px; border-radius:4px; border:1px solid #45475a;">${n.path}</div>
                    <button id="copy-path-btn" style="background:#89b4fa; border:none; padding:4px 8px; border-radius:4px; cursor:pointer; font-weight:bold; color:#11111b; margin-top:8px; width:100%;">Copy Path</button>
                    <button onclick="openPath('${n.path.replace(/\\/g, '\\\\')}')" style="background:#a6e3a1; border:none; padding:4px 8px; border-radius:4px; cursor:pointer; font-weight:bold; color:#11111b; margin-top:8px; width:100%;">Open in Explorer</button>
                </div>
                <div style="background:#313244; padding:10px; border-radius:4px; margin-bottom:1rem;">
                    <h2 style="margin:0; font-size:1rem; color:#f5c2e7;">Name:</h2>
                    <div style="font-size:0.9rem; margin-top:5px; word-break:break-all; font-weight:bold;">${n.name}</div>
                </div>
                <p><strong>Size:</strong> ${formatSize(n.size)} (Last3: ${n.size_last_3})</p>
                <p><strong>Modified:</strong> ${new Date(n.modified_at).toLocaleString()}</p>
                <p><strong>Is Folder:</strong> ${n.is_folder ? 'Yes' : 'No'}</p>
            `;
            
            // Add copy path functionality
            document.getElementById('copy-path-btn').addEventListener('click', function() {
                navigator.clipboard.writeText(n.path).then(() => {
                    this.textContent = 'Copied!';
                    setTimeout(() => { this.textContent = 'Copy Path'; }, 1500);
                });
            });

            // Find related
            const related = links
                .filter(l => l.source === n.id || l.target === n.id)
                .map(l => {
                    const otherId = l.source === n.id ? l.target : l.source;
                    const other = nodes.find(node => node.id === otherId);
                    return { node: other, score: l.similarity };
                })
                .sort((a, b) => b.score - a.score);

            relatedBody.innerHTML = '';
            if (related.length === 0) {
                relatedBody.innerHTML = '<tr><td colspan="2">No strong relations found</td></tr>';
            } else {
                related.forEach(r => {
                    if (!r.node) return;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${r.node.name}</td>
                        <td>${(r.score * 100).toFixed(1)}%</td>
                    `;
                    tr.style.cursor = 'pointer';
                    tr.onclick = (e) => {
                        e.stopPropagation();
                        selectNode(r.node);
                    };
                    relatedBody.appendChild(tr);
                });
            }
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

         function findConnectedNodes(startNode, maxDepth = 0) {
             const visited = new Set();
             const connected = [];
             
             function traverse(node, depth) {
                 if (visited.has(node.id) || depth > maxDepth) return;
                 visited.add(node.id);
                 if (node !== startNode) connected.push(node);
                 
                 // Find only DIRECT connections (depth 0 = only immediate neighbors)
                 if (depth < maxDepth) {
                     links.forEach(link => {
                         if (link.source === node.id || link.target === node.id) {
                             const otherId = link.source === node.id ? link.target : link.source;
                             const otherNode = nodes.find(n => n.id === otherId);
                             if (otherNode) traverse(otherNode, depth + 1);
                         }
                     });
                 }
             }
             
             traverse(startNode, 0);
             
             // Debug: Show which nodes are being dragged together
             if (connected.length > 0) {
                 console.log(`🧲 Dragging ${connected.length} directly connected nodes:`);
                 connected.forEach(node => console.log(`  🔗 ${node.name}`));
             }
             
             return connected;
         }

         function highlightSearchResults(foundNodes) {
             // Reset all nodes to normal appearance
             nodes.forEach(n => {
                 n.searchHighlight = false;
                 n.highlightAlpha = 0;
             });
            
            // Highlight all matching nodes
            foundNodes.forEach((node, index) => {
                node.searchHighlight = true;
                // Staggered highlight effect based on search order
                node.highlightAlpha = 1.0;
                node.highlightColor = `hsl(${(index * 30) % 360}, 80%, 60%)`;
            });
            
            // Animate the highlight effect
            const highlightInterval = setInterval(() => {
                let allFaded = true;
                foundNodes.forEach(node => {
                    if (node.highlightAlpha > 0.1) {
                        node.highlightAlpha *= 0.85; // Fade out gradually
                        allFaded = false;
                    } else {
                        node.highlightAlpha = 0;
                        node.searchHighlight = false;
                    }
                });
                
                if (allFaded) {
                    clearInterval(highlightInterval);
                }
            }, 100);
        }

         function applyBounceEnergy(node, energyX, energyY) {
             // Apply energy with physics simulation
             const bounceDecay = 0.85; // Energy decays over time
             const maxVelocity = 5;
             
             // Add energy to node velocity
             node.vx += Math.max(Math.min(energyX, maxVelocity), -maxVelocity);
             node.vy += Math.max(Math.min(energyY, maxVelocity), -maxVelocity);
             
             // Create bounce animation
             let bounceCount = 0;
             const maxBounces = 8;
             
             const bounceInterval = setInterval(() => {
                 // Apply decay
                 node.vx *= bounceDecay;
                 node.vy *= bounceDecay;
                 
                 // Stop bouncing when energy is low
                 if (Math.abs(node.vx) < 0.1 && Math.abs(node.vy) < 0.1 || bounceCount >= maxBounces) {
                     clearInterval(bounceInterval);
                     node.vx = 0;
                     node.vy = 0;
                 }
                 
                 bounceCount++;
             }, 50);
         }

         function navigateToFolder(folderPath) {
             console.log(`📁 Navigating to folder: ${folderPath}`);
             uiLog(`Navigating to folder: ${folderPath}`);
             
             // Update the directory input
             dirInput.value = folderPath;
             
             // Show parent button
             document.getElementById('parent-btn').style.display = 'block';
             
             // Trigger scan
             scan();
         }

         function navigateToParentFolder() {
             const currentPath = dirInput.value;
             const parentPath = getParentPath(currentPath);
             
             if (parentPath) {
                 console.log(`⬆️ Navigating to parent folder: ${parentPath}`);
                 uiLog(`Navigating to parent folder: ${parentPath}`);
                 
                 dirInput.value = parentPath;
                 scan();
                 
                 // Hide parent button if at root
                 if (parentPath === '' || parentPath === '.' || parentPath === currentPath) {
                     document.getElementById('parent-btn').style.display = 'none';
                 }
             }
         }

         function getParentPath(path) {
             if (!path || path === '.' || path === '' || path === '/' || path === '\\\\') {
                 return null;
             }
             
             // Remove trailing slash if exists
             path = path.replace(/[\\/]+$/, '');
             
             // Find last slash
             const lastSlash = Math.max(path.lastIndexOf('\\'), path.lastIndexOf('/'));
             
             if (lastSlash > 0) {
                 return path.substring(0, lastSlash);
             } else {
                 return '.';
             }
         }

         // Search functionality moved to main search listener

            try {
                const resp = await fetch('/api/startpath');
                const data = await resp.json();
                if (data.path) {
                    dirInput.value = data.path;
                    status.textContent = 'Auto-scanning: ' + data.path;
                    scanProgress.textContent = 'Starting scan...';
                    scan();
                } else {
                    setTimeout(scan, 1500);
                }
            } catch (e) {
                setTimeout(scan, 1500);
            }
        }
        
        initStartPath();
    </script>
